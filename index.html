<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Heatmap · CONTPAQi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── Tokens ── */
  :root {
    --bg:         #141820;
    --surface:    #1e2330;
    --surface2:   #242b3a;
    --border:     #2a3040;
    --text:       #c9d1d9;
    --muted:      #5a6478;
    --heading:    #f0f6fc;
    --cell-empty: #252d3d;
    --shadow:     rgba(0,0,0,.5);
    --toggle-bg:  #2a3040;
    --accent:     #00C98A;
  }

  [data-theme="light"] {
    --bg:         #f0f2f5;
    --surface:    #ffffff;
    --surface2:   #f7f8fa;
    --border:     #dde1e8;
    --text:       #3b4152;
    --muted:      #8b95a8;
    --heading:    #1a1f2e;
    --cell-empty: #e2e6ed;
    --shadow:     rgba(0,0,0,.10);
    --toggle-bg:  #e2e6ed;
    --accent:     #00A572;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
    display: flex;
    justify-content: center;
    padding: 52px 48px 80px;
  }

  .page { width: fit-content; min-width: 0; }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 40px;
    margin-bottom: 36px;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--heading);
    letter-spacing: -.5px;
    margin-bottom: 4px;
    white-space: nowrap;
  }

  h1 span { color: var(--accent); }
  .subtitle { font-size: 11px; color: var(--muted); }

  /* ── Theme toggle ── */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .toggle-track {
    width: 40px; height: 22px;
    border-radius: 11px;
    background: var(--toggle-bg);
    border: 1px solid var(--border);
    position: relative;
    transition: background .25s;
    flex-shrink: 0;
  }

  .toggle-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--muted);
    position: absolute;
    top: 2px; left: 3px;
    transition: transform .25s, background .25s;
  }

  [data-theme="light"] .toggle-thumb { transform: translateX(18px); background: var(--accent); }

  /* ── Stats ── */
  .stats {
    display: flex;
    gap: 12px;
    flex-wrap: nowrap;
    margin-bottom: 28px;
    align-items: stretch;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    min-width: 110px;
    transition: background .3s, border-color .3s;
  }

  .stat-value { font-size: 24px; font-weight: 800; font-family: 'Syne', sans-serif; line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .btn-add {
    background: var(--accent);
    color: #0d1a14;
    border: none;
    border-radius: 10px;
    padding: 14px 24px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: opacity .15s, transform .15s;
    white-space: nowrap;
    align-self: flex-end;
  }

  .btn-add:hover { opacity: .88; transform: translateY(-1px); }

  /* ── Form ── */
  #form-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    margin-bottom: 24px;
    gap: 14px;
    flex-wrap: wrap;
    align-items: flex-end;
    transition: background .3s;
  }

  #form-panel.open { display: flex; }

  .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 130px; }
  .field label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .field input, .field select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 11px;
    color: var(--text);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    outline: none;
    transition: border-color .15s, background .3s;
  }

  .field input:focus, .field select:focus { border-color: var(--accent); }

  .btn-confirm {
    background: var(--accent);
    color: #0d1a14;
    border: none;
    border-radius: 7px;
    padding: 9px 20px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    height: 38px;
    align-self: flex-end;
    font-family: 'Syne', sans-serif;
    transition: opacity .15s;
  }

  .btn-confirm:hover { opacity: .85; }

  /* ── Heatmap card ── */
  .heatmap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 28px 22px;
    width: fit-content;
    transition: background .3s, border-color .3s;
  }

  .annual-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .month-header {
    display: flex;
    margin-left: 134px;
    margin-bottom: 12px;
  }

  /* Month labels in annual view — clickable */
  .month-lbl {
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
    white-space: nowrap;
    overflow: visible;
    cursor: pointer;
    transition: color .15s;
  }

  .month-lbl:hover { color: var(--accent); }
  .month-lbl.active-month { color: var(--accent); font-weight: 600; }

  /* ── Designer rows (annual) ── */
  .designer-row {
    display: flex;
    align-items: center;
    margin-bottom: 9px;
  }

  .designer-row:last-child { margin-bottom: 0; }

  .designer-label {
    width: 134px;
    flex-shrink: 0;
    padding-right: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .designer-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .designer-name {
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .weeks-row { display: flex; gap: 3px; }

  .h-cell {
    width: 14px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform .1s;
  }

  .h-cell:hover { transform: scale(1.7); z-index: 10; position: relative; }
  .h-cell.today-ring { outline: 1.5px solid var(--heading); outline-offset: 1px; }

  /* ── Monthly drill-down panel ── */
  .monthly-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height .4s cubic-bezier(.4,0,.2,1), opacity .3s;
    opacity: 0;
  }

  .monthly-panel.open {
    max-height: 600px;
    opacity: 1;
  }

  .monthly-inner {
    margin-top: 36px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  /* Panel header row */
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 16px;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--heading);
    white-space: nowrap;
  }

  .panel-title span { color: var(--accent); }

  .month-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .month-nav {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: border-color .15s, background .15s;
    flex-shrink: 0;
  }

  .month-nav:hover { border-color: var(--accent); color: var(--accent); }

  .month-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    outline: none;
    cursor: pointer;
    transition: border-color .15s;
  }

  .month-select:focus { border-color: var(--accent); }

  .btn-close-panel {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    transition: border-color .15s, color .15s;
    flex-shrink: 0;
  }

  .btn-close-panel:hover { border-color: var(--border); color: var(--heading); }

  /* Monthly grid */
  .monthly-grid-wrap {
    overflow: visible;
  }

  .monthly-month-header {
    display: flex;
    margin-left: 134px;
    margin-bottom: 8px;
    gap: 3px;
  }

  .day-col-lbl {
    flex-shrink: 0;
    text-align: center;
    font-size: 9px;
    color: var(--muted);
  }

  .day-col-lbl.weekend { color: var(--muted); opacity: .5; }
  .day-col-lbl.today-lbl { color: var(--accent); font-weight: 600; }

  .monthly-designer-row {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }

  .monthly-designer-row:last-child { margin-bottom: 0; }

  .m-cell {
    flex-shrink: 0;
    border-radius: 4px;
    cursor: pointer;
    transition: transform .1s;
    height: 22px;
  }

  .m-cell:hover { transform: scale(1.25); z-index: 10; position: relative; }
  .m-cell.today-m { outline: 1.5px solid var(--heading); outline-offset: 1px; }

  /* ── Legend ── */
  .legend-bar {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 18px;
    justify-content: flex-end;
  }

  .legend-bar span { font-size: 10px; color: var(--muted); }
  .l-cell { width: 14px; height: 14px; border-radius: 3px; }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 15px;
    font-size: 12px;
    z-index: 1000;
    pointer-events: none;
    max-width: 260px;
    box-shadow: 0 10px 30px var(--shadow);
    transition: background .3s;
  }

  #tooltip.visible { display: block; }

  .tt-date     { color: var(--heading); font-weight: 700; margin-bottom: 6px; font-family: 'Syne', sans-serif; font-size: 13px; }
  .tt-designer { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
  .tt-count    { font-size: 11px; margin-bottom: 5px; }
  .tt-item     { color: var(--muted); font-size: 11px; margin-bottom: 2px; padding-left: 8px; }
  .tt-type     { opacity: .6; }
  .tt-empty    { color: var(--muted); font-size: 11px; }
  .tt-day-lbl  { font-size: 10px; color: var(--muted); margin-top: 5px; margin-bottom: 2px; }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="eyebrow">CONTPAQi · Design Team</div>
      <h1>Entregables <span>listos para Dev</span></h1>
      <p class="subtitle">Haz clic en un mes del mapa anual para ver el detalle</p>
    </div>
    <div class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-label">Dark</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span>Light</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="stat-total" style="color:#00C98A">0</div>
      <div class="stat-label">Total entregables</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-best" style="color:#00C98A">0</div>
      <div class="stat-label">Mejor día</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-top" style="color:#5a6478">—</div>
      <div class="stat-label">Top contribuidor</div>
    </div>
    <button class="btn-add" onclick="toggleForm()">+ Registrar entregable</button>
  </div>

  <!-- Form -->
  <div id="form-panel">
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="f-date">
    </div>
    <div class="field">
      <label>Diseñador</label>
      <select id="f-designer">
        <option value="jonathan">Jonathan Alderete</option>
        <option value="maritza">Maritza Martell</option>
        <option value="itzel">Itzel Garza</option>
        <option value="daniel">Daniel Cauich</option>
        <option value="jeremy">Jeremy Jasso</option>
      </select>
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="f-type">
        <option>Flujo UX</option>
        <option>UI Screens</option>
        <option>Prototipo</option>
        <option>Design System</option>
        <option>Handoff Dev</option>
        <option>Investigación</option>
        <option>Otro</option>
      </select>
    </div>
    <div class="field" style="min-width:200px">
      <label>Nombre del entregable</label>
      <input type="text" id="f-name" placeholder="ej. Flujo onboarding Personia">
    </div>
    <button class="btn-confirm" onclick="addDeliverable()">✓</button>
  </div>

  <!-- Heatmap card -->
  <div class="heatmap-card">

    <!-- Annual view -->
    <div class="annual-label">Vista anual</div>
    <div class="month-header" id="month-header"></div>
    <div id="annual-grid"></div>

    <!-- Monthly drill-down (inline) -->
    <div class="monthly-panel" id="monthly-panel">
      <div class="monthly-inner">
        <div class="panel-header">
          <div class="panel-title" id="panel-title">Marzo <span>2025</span></div>
          <div class="month-controls">
            <button class="month-nav" onclick="navigateMonth(-1)" title="Mes anterior">‹</button>
            <select class="month-select" id="month-select" onchange="selectMonth(this.value)"></select>
            <button class="month-nav" onclick="navigateMonth(1)" title="Mes siguiente">›</button>
            <button class="btn-close-panel" onclick="closePanel()" title="Cerrar">×</button>
          </div>
        </div>
        <div class="monthly-grid-wrap">
          <div class="monthly-month-header" id="monthly-month-header"></div>
          <div id="monthly-grid"></div>
        </div>
      </div>
    </div>

    <!-- Legend -->
    <div class="legend-bar" id="legend-bar"></div>
  </div>

</div>

<div id="tooltip"></div>

<script>
const DESIGNERS = [
  { id: "jonathan", name: "Jonathan Alderete", color: "#00C98A" },
  { id: "maritza",  name: "Maritza Martell",   color: "#FF6B6B" },
  { id: "itzel",    name: "Itzel Garza",        color: "#FFB830" },
  { id: "daniel",   name: "Daniel Cauich",      color: "#7B8CDE" },
  { id: "jeremy",   name: "Jeremy Jasso",       color: "#F472B6" },
];

const MONTHS_SHORT = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MONTHS_LONG  = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_SHORT   = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

const CELL_W  = 14;
const COL_W   = CELL_W + 3; // 17px

let deliverables   = {};
let activeMonthKey = null; // "YYYY-MM"

const todayDate = new Date();
const todayStr  = todayDate.toISOString().split("T")[0];
document.getElementById("f-date").value = todayStr;

// ── Theme ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html   = document.documentElement;
  const isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  document.getElementById("theme-label").textContent = isDark ? "Light" : "Dark";
}

// ── Date helpers ───────────────────────────────────────────────────────────
function getAllDates() {
  const dates = [], today = new Date();
  const start = new Date(today);
  start.setFullYear(today.getFullYear() - 1);
  start.setDate(start.getDate() + 1);
  const cur = new Date(start);
  while (cur <= today) {
    dates.push(cur.toISOString().split("T")[0]);
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

function buildWeeks(dates) {
  const startDow = new Date(dates[0]).getDay();
  const weeks = [];
  let week = Array(startDow).fill(null);
  for (const d of dates) {
    week.push(d);
    if (week.length === 7) { weeks.push(week); week = []; }
  }
  if (week.length) { while (week.length < 7) week.push(null); weeks.push(week); }
  return weeks;
}

function getDaysInMonth(year, month) {
  // month = 0-indexed
  const days = [];
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const mm = String(month + 1).padStart(2, "0");
    const dd = String(d).padStart(2, "0");
    days.push(`${year}-${mm}-${dd}`);
  }
  return days;
}

function getAvailableMonths() {
  const dates = getAllDates();
  const seen  = new Set();
  dates.forEach(d => seen.add(d.slice(0, 7)));
  return [...seen].sort();
}

// ── Color ──────────────────────────────────────────────────────────────────
function cellColor(count, hex) {
  if (count === 0) return "var(--cell-empty)";
  const alphas = ["55","88","BB","FF"];
  return hex + alphas[Math.min(count - 1, 3)];
}

function entriesFor(date, did) {
  return (deliverables[date] || []).filter(e => e.designer === did);
}

// ── Tooltip ────────────────────────────────────────────────────────────────
const tooltip = document.getElementById("tooltip");

function positionTooltip(e) {
  tooltip.style.left = Math.min(e.clientX + 14, window.innerWidth - 280) + "px";
  tooltip.style.top  = (e.clientY - 12) + "px";
}

function makeTooltip(label, designer, entries) {
  let html = `<div class="tt-date">${label}</div>`;
  html    += `<div class="tt-designer" style="color:${designer.color}">${designer.name}</div>`;
  if (!entries.length) {
    html += `<div class="tt-empty">Sin entregables</div>`;
  } else {
    html += `<div class="tt-count" style="color:${designer.color}">${entries.length} entregable${entries.length > 1 ? "s" : ""}</div>`;
    entries.slice(0, 5).forEach(item => {
      html += `<div class="tt-item">· ${item.name} <span class="tt-type">(${item.type})</span></div>`;
    });
    if (entries.length > 5) html += `<div class="tt-item" style="opacity:.5">+${entries.length - 5} más</div>`;
  }
  return html;
}

function attachTooltip(cell, labelFn, designer, entriesFn) {
  cell.addEventListener("mouseenter", e => {
    tooltip.innerHTML        = makeTooltip(labelFn(), designer, entriesFn());
    tooltip.style.borderColor = designer.color + "55";
    tooltip.classList.add("visible");
    positionTooltip(e);
  });
  cell.addEventListener("mousemove", positionTooltip);
  cell.addEventListener("mouseleave", () => tooltip.classList.remove("visible"));
}

// ── Month select dropdown ──────────────────────────────────────────────────
function buildMonthSelect() {
  const sel   = document.getElementById("month-select");
  const months = getAvailableMonths();
  sel.innerHTML = "";
  months.forEach(mk => {
    const [y, m] = mk.split("-").map(Number);
    const opt    = document.createElement("option");
    opt.value    = mk;
    opt.textContent = `${MONTHS_LONG[m - 1]} ${y}`;
    if (mk === activeMonthKey) opt.selected = true;
    sel.appendChild(opt);
  });
}

function selectMonth(key) {
  activeMonthKey = key;
  openPanel();
}

function navigateMonth(dir) {
  const months = getAvailableMonths();
  const idx    = months.indexOf(activeMonthKey);
  const newIdx = idx + dir;
  if (newIdx >= 0 && newIdx < months.length) {
    activeMonthKey = months[newIdx];
    openPanel();
  }
}

// ── Annual grid ────────────────────────────────────────────────────────────
function buildAnnualGrid() {
  const dates = getAllDates();
  const weeks = buildWeeks(dates);

  // Month labels — clickable
  const monthHeader = document.getElementById("month-header");
  monthHeader.innerHTML = "";
  let lastMonth = -1;
  const monthWeekMap = {}; // monthKey → first weekIndex

  weeks.forEach((w, wi) => {
    const div = document.createElement("div");
    div.className        = "month-lbl";
    div.style.width      = COL_W + "px";
    div.style.flexShrink = "0";

    const fv = w.find(d => d !== null);
    if (fv) {
      const m  = new Date(fv).getMonth();
      const y  = new Date(fv).getFullYear();
      const mk = `${y}-${String(m+1).padStart(2,"0")}`;

      if (m !== lastMonth) {
        div.textContent = MONTHS_SHORT[m];
        if (mk === activeMonthKey) div.classList.add("active-month");
        monthWeekMap[mk] = wi;
        div.onclick = () => { activeMonthKey = mk; openPanel(); };
        lastMonth = m;
      }
    }
    monthHeader.appendChild(div);
  });

  // Designer rows
  const grid = document.getElementById("annual-grid");
  grid.innerHTML = "";

  DESIGNERS.forEach(designer => {
    const row = document.createElement("div");
    row.className = "designer-row";

    const label = document.createElement("div");
    label.className = "designer-label";
    label.innerHTML = `<div class="designer-dot" style="background:${designer.color}"></div>
                       <span class="designer-name">${designer.name}</span>`;
    row.appendChild(label);

    const weeksRow = document.createElement("div");
    weeksRow.className = "weeks-row";

    weeks.forEach(week => {
      const weekTotal      = week.reduce((s, d) => d ? s + entriesFor(d, designer.id).length : s, 0);
      const hasTodayInWeek = week.includes(todayStr);

      const fv = week.find(d => d !== null);
      const lv = [...week].reverse().find(d => d !== null);

      const cell = document.createElement("div");
      cell.className    = "h-cell" + (hasTodayInWeek ? " today-ring" : "");
      cell.style.background = cellColor(weekTotal, designer.color);

      // Click week → open that month
      if (fv) {
        const d  = new Date(fv + "T12:00:00");
        const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
        cell.onclick = () => { activeMonthKey = mk; openPanel(); };
      }

      // Tooltip
      const labelFn  = () => {
        if (!fv) return "";
        const fmt = d => new Date(d + "T12:00:00").toLocaleDateString("es-MX", { day:"numeric", month:"short" });
        return `${fmt(fv)} – ${fmt(lv)}`;
      };
      const entFn = () => {
        const all = [];
        week.forEach(d => { if (d) entriesFor(d, designer.id).forEach(e => all.push(e)); });
        return all;
      };

      // Override tooltip to show week summary
      cell.addEventListener("mouseenter", e => {
        const entries = entFn();
        let html = `<div class="tt-date">${labelFn()}</div>`;
        html    += `<div class="tt-designer" style="color:${designer.color}">${designer.name}</div>`;
        if (!entries.length) {
          html += `<div class="tt-empty">Sin entregables esta semana</div>`;
        } else {
          html += `<div class="tt-count" style="color:${designer.color}">${entries.length} entregable${entries.length > 1 ? "s" : ""}</div>`;
          week.forEach(date => {
            if (!date) return;
            const de = entriesFor(date, designer.id);
            if (!de.length) return;
            const dl = new Date(date + "T12:00:00").toLocaleDateString("es-MX", { weekday:"short", day:"numeric" });
            html += `<div class="tt-day-lbl">${dl}</div>`;
            de.forEach(item => {
              html += `<div class="tt-item">· ${item.name} <span class="tt-type">(${item.type})</span></div>`;
            });
          });
        }
        html += `<div style="margin-top:8px;font-size:10px;color:var(--muted)">Clic para ver el mes completo</div>`;
        tooltip.innerHTML = html;
        tooltip.style.borderColor = designer.color + "55";
        tooltip.classList.add("visible");
        positionTooltip(e);
      });
      cell.addEventListener("mousemove", positionTooltip);
      cell.addEventListener("mouseleave", () => tooltip.classList.remove("visible"));

      weeksRow.appendChild(cell);
    });

    row.appendChild(weeksRow);
    grid.appendChild(row);
  });
}

// ── Monthly drill-down ──────────────────────────────────────────────────────
function buildMonthlyGrid() {
  if (!activeMonthKey) return;

  const [y, m] = activeMonthKey.split("-").map(Number);
  const days   = getDaysInMonth(y, m - 1);

  // Match annual grid width exactly:
  // annual total width = weeks.length × COL_W (14px cell + 3px gap)
  // monthly available  = annualTotalWidth − last gap (no trailing gap)
  // cell width         = (availableWidth − (days.length−1) × M_GAP) / days.length
  const annualWeeks   = buildWeeks(getAllDates());
  const annualWidth   = annualWeeks.length * COL_W - 3; // subtract trailing gap
  const M_GAP         = 3;
  const M_CELL        = Math.floor((annualWidth - (days.length - 1) * M_GAP) / days.length);

  // Panel title
  document.getElementById("panel-title").innerHTML =
    `${MONTHS_LONG[m-1]} <span>${y}</span>`;

  // Update select
  buildMonthSelect();

  // Day headers
  const hdr = document.getElementById("monthly-month-header");
  hdr.innerHTML = "";
  days.forEach(date => {
    const d   = new Date(date + "T12:00:00");
    const dow = d.getDay();
    const div = document.createElement("div");
    div.className   = "day-col-lbl" +
      (dow === 0 || dow === 6 ? " weekend" : "") +
      (date === todayStr ? " today-lbl" : "");
    div.style.width = M_CELL + "px";
    div.style.flexShrink = "0";
    div.innerHTML = `<div>${d.getDate()}</div><div style="font-size:8px;opacity:.6">${DAYS_SHORT[dow].slice(0,2)}</div>`;
    div.style.lineHeight = "1.2";
    hdr.appendChild(div);
  });

  // Designer rows
  const grid = document.getElementById("monthly-grid");
  grid.innerHTML = "";

  DESIGNERS.forEach(designer => {
    const row = document.createElement("div");
    row.className = "monthly-designer-row";

    const label = document.createElement("div");
    label.className = "designer-label";
    label.innerHTML = `<div class="designer-dot" style="background:${designer.color}"></div>
                       <span class="designer-name">${designer.name}</span>`;
    row.appendChild(label);

    days.forEach((date, i) => {
      const entries = entriesFor(date, designer.id);
      const count   = entries.length;
      const d       = new Date(date + "T12:00:00");
      const dow     = d.getDay();

      const cell = document.createElement("div");
      cell.className = "m-cell" + (date === todayStr ? " today-m" : "");
      cell.style.width       = M_CELL + "px";
      cell.style.marginRight = i < days.length - 1 ? M_GAP + "px" : "0";
      cell.style.background  = cellColor(count, designer.color);
      if (dow === 0 || dow === 6) cell.style.opacity = count > 0 ? "1" : "0.4";

      const lbl = d.toLocaleDateString("es-MX", { weekday:"long", day:"numeric", month:"long" });
      attachTooltip(cell, () => lbl, designer, () => entries);

      row.appendChild(cell);
    });

    grid.appendChild(row);
  });
}

function openPanel() {
  buildMonthlyGrid();
  // Highlight active month in annual header
  document.querySelectorAll(".month-lbl").forEach(el => el.classList.remove("active-month"));
  document.querySelectorAll(".month-lbl").forEach(el => {
    // re-render to sync active state
  });
  buildAnnualGrid(); // re-render to update active highlight
  const panel = document.getElementById("monthly-panel");
  panel.classList.add("open");
  // Smooth scroll so panel is visible
  setTimeout(() => panel.scrollIntoView({ behavior: "smooth", block: "nearest" }), 50);
}

function closePanel() {
  activeMonthKey = null;
  document.getElementById("monthly-panel").classList.remove("open");
  buildAnnualGrid();
}

// ── Legend ──────────────────────────────────────────────────────────────────
function buildLegend() {
  const bar = document.getElementById("legend-bar");
  bar.innerHTML = `<span>Menos</span>`;
  [0,1,2,3,4].forEach(v => {
    const c = document.createElement("div");
    c.className = "l-cell";
    c.style.background = cellColor(v, "#00C98A");
    bar.appendChild(c);
  });
  bar.innerHTML += `<span>Más</span>`;
}

// ── Stats ───────────────────────────────────────────────────────────────────
function updateStats() {
  const dates = getAllDates();
  let total = 0, best = 0;
  const perD = {};
  DESIGNERS.forEach(d => perD[d.id] = 0);

  dates.forEach(date => {
    let day = 0;
    DESIGNERS.forEach(d => {
      const c = entriesFor(date, d.id).length;
      perD[d.id] += c; day += c; total += c;
    });
    if (day > best) best = day;
  });

  const top   = Object.entries(perD).sort((a,b) => b[1]-a[1])[0];
  const topD  = DESIGNERS.find(d => d.id === top[0]);
  const hasData = top[1] > 0;

  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-best").textContent  = best;
  document.getElementById("stat-top").textContent   = hasData ? topD.name.split(" ")[0] : "—";
  document.getElementById("stat-top").style.color   = hasData ? topD.color : "var(--muted)";
}

// ── Form ─────────────────────────────────────────────────────────────────────
function toggleForm() {
  document.getElementById("form-panel").classList.toggle("open");
}

function addDeliverable() {
  const date     = document.getElementById("f-date").value;
  const designer = document.getElementById("f-designer").value;
  const type     = document.getElementById("f-type").value;
  const name     = document.getElementById("f-name").value.trim();
  if (!name || !date) return;
  if (!deliverables[date]) deliverables[date] = [];
  deliverables[date].push({ id: Date.now(), date, designer, type, name });
  document.getElementById("f-name").value = "";
  document.getElementById("form-panel").classList.remove("open");
  render();
  // Re-open panel for same month if open
  if (activeMonthKey) buildMonthlyGrid();
}

document.getElementById("f-name").addEventListener("keydown", e => {
  if (e.key === "Enter") addDeliverable();
});

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  buildAnnualGrid();
  updateStats();
  buildLegend();
}

render();
</script>
